name: backend-pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CDK_DEFAULT_REGION: us-east-1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Lambda asset
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .build/backend-lambda
          mkdir -p .build/backend-lambda

          cp -R app/backend/app .build/backend-lambda/
          cp app/backend/requirements.txt .build/backend-lambda/

          python -m pip install --upgrade pip
          python -m pip install -r .build/backend-lambda/requirements.txt -t .build/backend-lambda

          cat > .build/backend-lambda/run.sh <<'EOF'
          #!/bin/bash
          export PYTHONPATH=$PYTHONPATH:/var/task
          exec python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          EOF

          chmod +x .build/backend-lambda/run.sh

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Build CDK app
        working-directory: infrastructure
        run: npm run build

      - name: Deploy backend stack
        working-directory: infrastructure
        run: npx cdk deploy BackendStack --require-approval never -c backendAssetDir=../.build/backend-lambda
